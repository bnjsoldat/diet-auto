<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Versioning ?v=2 = cache-buster après refonte logo 3 anneaux (21/04/26).
         Incrémenter à chaque changement de logo pour forcer le refresh
         chez les visiteurs dont le navigateur a gardé l'ancien favicon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ma Diét" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="robots" content="index, follow" />

    <title>Ma Diét — Plan alimentaire optimisé</title>
    <meta name="description" content="Ma Diét — calcule ton besoin calorique, choisis tes aliments (3 010 aliments CIQUAL + scan code-barres), et ajuste les quantités automatiquement pour atteindre tes cibles macros. Gratuit, sync multi-appareil, base française." />

    <!-- Canonical : évite la duplication SEO avec l'ancienne URL Vercel -->
    <link rel="canonical" href="https://madiet.lentreprise.ai/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, WhatsApp…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ma Diét" />
    <meta property="og:title" content="Ma Diét — Plan alimentaire optimisé" />
    <meta property="og:description" content="Calcule ton besoin calorique, choisis tes aliments, et ajuste les quantités automatiquement pour atteindre tes cibles macros. Gratuit, sync multi-appareil." />
    <meta property="og:url" content="https://madiet.lentreprise.ai/" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:image" content="https://madiet.lentreprise.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ma Diét — écran de progression avec anneau calorique à 2 450 / 2 745 kcal" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ma Diét — Plan alimentaire optimisé" />
    <meta name="twitter:description" content="Calcule ton besoin calorique, scanne des produits, optimise ton plan en un clic. Gratuit, sync multi-appareil." />
    <meta name="twitter:image" content="https://madiet.lentreprise.ai/og-image.png" />
    <meta name="twitter:image:alt" content="Ma Diét — planificateur alimentaire avec anneau de progression" />

    <!-- Fonts : preconnect + preload du woff2 critique pour minimiser le FCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Schema.org structured data (WebApplication) pour SEO riche Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ma Diét",
        "url": "https://madiet.lentreprise.ai/",
        "description": "Planificateur alimentaire gratuit qui optimise automatiquement les quantités de tes repas pour atteindre tes cibles caloriques et macros. Base de 3 010 aliments français (CIQUAL), scan code-barres, sync multi-appareil.",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web, iOS, Android",
        "inLanguage": "fr-FR",
        "browserRequirements": "Requires modern browser with JavaScript enabled.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "featureList": [
          "Calcul du métabolisme de base (Harris-Benedict)",
          "Optimisation automatique des quantités",
          "Scan code-barres avec Open Food Facts",
          "3 010 aliments de la base CIQUAL (ANSES)",
          "Recettes composées avec étapes",
          "Suivi de poids avec graphique",
          "Vue semaine et liste de courses",
          "Synchronisation multi-appareil optionnelle",
          "Export PDF et CSV",
          "Hors-ligne et installable sur écran d'accueil"
        ],
        "publisher": {
          "@type": "Organization",
          "name": "Ma Diét",
          "url": "https://madiet.lentreprise.ai/"
        }
      }
    </script>

    <!-- FAQPage Schema pour enrichir la page /aide -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Qu'est-ce que Ma Diét ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ma Diét est un planificateur alimentaire gratuit qui calcule ton besoin calorique et ajuste automatiquement les quantités de tes repas pour atteindre tes cibles en protéines, glucides et lipides. Création de compte gratuite (email, lien magique ou Google) pour synchroniser tes plans sur tous tes appareils."
            }
          },
          {
            "@type": "Question",
            "name": "Comment est calculé mon besoin calorique ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ma Diét utilise la formule de Harris-Benedict (métabolisme de base) multipliée par un coefficient d'activité (sédentaire à extrêmement actif), puis ajuste avec ton objectif (perte, maintien, prise de masse). Tu obtiens ta cible calorique journalière et la répartition recommandée des macros."
            }
          },
          {
            "@type": "Question",
            "name": "Est-ce que Ma Diét coûte quelque chose ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Non, Ma Diét est gratuit. Pas d'inscription obligatoire, pas de publicité, pas de tracking. Un abonnement premium sera proposé plus tard pour des fonctionnalités avancées, mais l'app restera fonctionnelle en gratuit."
            }
          },
          {
            "@type": "Question",
            "name": "Ma Diét est-il un conseil médical ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Non. Ma Diét fournit des calculs indicatifs basés sur des formules standards. Pour un suivi personnalisé ou en cas de pathologie, consultez un diététicien ou un médecin."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
