<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 3 anneaux concentriques. Dasharray en unités pixels directes
       (évite le fallback buggué de pathLength sur certains renderers PNG). -->
  <g transform="rotate(-90 32 32)" fill="none" stroke-linecap="round">
    <!-- Externe r=22, circ=138.2, 75% plein -->
    <circle cx="32" cy="32" r="22" stroke="#ffffff" stroke-width="4" stroke-opacity="0.22"/>
    <circle cx="32" cy="32" r="22" stroke="#ffffff" stroke-width="4"
            stroke-dasharray="104 35"/>
    <!-- Milieu r=14, circ=87.9, 72% plein -->
    <circle cx="32" cy="32" r="14" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.22"/>
    <circle cx="32" cy="32" r="14" stroke="#ffffff" stroke-width="3.5"
            stroke-dasharray="63 25"/>
    <!-- Interne r=6.5, circ=40.8, 62% plein -->
    <circle cx="32" cy="32" r="6.5" stroke="#ffffff" stroke-width="2.6" stroke-opacity="0.22"/>
    <circle cx="32" cy="32" r="6.5" stroke="#ffffff" stroke-width="2.6"
            stroke-dasharray="25 16"/>
  </g>
</svg>
